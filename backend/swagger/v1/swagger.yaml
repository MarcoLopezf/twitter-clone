---
openapi: 3.0.1
info:
  title: The Flock API
  version: v1
  description: Twitter clone API documentation
paths:
  "/api/v1/auth/register":
    post:
      summary: Register a new user
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: user registered
        '422':
          description: validation failed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - username
              - password
              properties:
                email:
                  type: string
                  example: newuser@example.com
                username:
                  type: string
                  example: newuser
                display_name:
                  type: string
                  example: New User
                password:
                  type: string
                  example: Password1!
                bio:
                  type: string
                  example: Hello world
                avatar_url:
                  type: string
                  example: https://example.com/avatar.png
  "/api/v1/auth/login":
    post:
      summary: Login with email and password
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: login successful
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  example: docuser@example.com
                password:
                  type: string
                  example: Password1!
  "/api/v1/auth/me":
    get:
      summary: Return the authenticated user
      tags:
      - Auth
      security:
      - bearer_auth: []
      responses:
        '200':
          description: authenticated
        '401':
          description: unauthenticated
  "/api/v1/users/{id}/follow":
    post:
      summary: Follow a user
      tags:
      - Follows
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to follow
        schema:
          type: integer
      responses:
        '201':
          description: follow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      follower_id:
                        type: integer
                        example: 6
                      following_id:
                        type: integer
                        example: 5
                      created_at:
                        type: string
                        example: '2026-02-27T20:53:54.595Z'
        '422':
          description: cannot follow yourself
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Validation failed
                  details:
                    type: array
                    items:
                      type: string
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/users/{id}/unfollow":
    delete:
      summary: Unfollow a user
      tags:
      - Follows
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to unfollow
        schema:
          type: integer
      responses:
        '204':
          description: unfollowed successfully
        '422':
          description: not following this user
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not following this user
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/users/{id}/followers":
    get:
      summary: List followers of a user
      tags:
      - Follows
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the user whose followers to list
        schema:
          type: integer
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      responses:
        '200':
          description: paginated followers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        username:
                          type: string
                        display_name:
                          type: string
                        bio:
                          type: string
                          nullable: true
                        avatar_url:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 1
                      page:
                        type: integer
                        example: 1
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/users/{id}/following":
    get:
      summary: List users followed by a user
      tags:
      - Follows
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the user whose following list to retrieve
        schema:
          type: integer
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      responses:
        '200':
          description: paginated following list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        username:
                          type: string
                        display_name:
                          type: string
                        bio:
                          type: string
                          nullable: true
                        avatar_url:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 1
                      page:
                        type: integer
                        example: 1
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/tweets/{id}/like":
    post:
      summary: Like a tweet
      tags:
      - Likes
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the tweet to like
        schema:
          type: integer
      responses:
        '201':
          description: like created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 7
                      tweet_id:
                        type: integer
                        example: 3
                      created_at:
                        type: string
                        example: '2026-02-27T21:07:21.891Z'
        '422':
          description: already liked
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Validation failed
                  details:
                    type: array
                    items:
                      type: string
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/tweets/{id}/unlike":
    delete:
      summary: Unlike a tweet
      tags:
      - Likes
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the tweet to unlike
        schema:
          type: integer
      responses:
        '204':
          description: unliked successfully
        '422':
          description: not liked
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not liked
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/tweets":
    post:
      summary: Create a tweet
      tags:
      - Tweets
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: tweet created
        '422':
          description: content too long
        '401':
          description: unauthenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - content
              properties:
                content:
                  type: string
                  example: Hello from the Flock API!
  "/api/v1/tweets/{id}":
    delete:
      summary: Delete a tweet
      tags:
      - Tweets
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: tweet deleted
        '403':
          description: not the owner
        '401':
          description: unauthenticated
  "/api/v1/tweets/timeline":
    get:
      summary: Get paginated timeline
      tags:
      - Tweets
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      responses:
        '200':
          description: paginated timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        content:
                          type: string
                        created_at:
                          type: string
                        likes_count:
                          type: integer
                        liked_by_current_user:
                          type: boolean
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                            username:
                              type: string
                            display_name:
                              type: string
                            avatar_url:
                              type: string
                              nullable: true
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 1
                      page:
                        type: integer
                        example: 1
        '401':
          description: unauthenticated
  "/api/v1/users/{username}":
    get:
      summary: Get a user's public profile
      tags:
      - Users
      security:
      - bearer_auth: []
      parameters:
      - name: username
        in: path
        required: true
        description: Username of the user
        schema:
          type: string
      responses:
        '200':
          description: profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '2'
                      type:
                        type: string
                        example: user
                      attributes:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          email:
                            type: string
                            example: docuser@example.com
                          username:
                            type: string
                            example: docuser
                          display_name:
                            type: string
                            example: Doc User
                          bio:
                            type: string
                            nullable: true
                            example: A short bio.
                          avatar_url:
                            type: string
                            nullable: true
                            example: https://example.com/avatar.png
                          created_at:
                            type: string
                            example: '2026-02-26T19:41:16.797Z'
                          tweet_count:
                            type: integer
                            example: 0
                          followers_count:
                            type: integer
                            example: 0
                          following_count:
                            type: integer
                            example: 0
                          is_following:
                            type: boolean
                            example: false
        '404':
          description: user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
  "/api/v1/users/me":
    patch:
      summary: Update current user's profile
      tags:
      - Users
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '2'
                      type:
                        type: string
                        example: user
                      attributes:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          email:
                            type: string
                            example: docuser@example.com
                          username:
                            type: string
                            example: docuser
                          display_name:
                            type: string
                            example: Doc User
                          bio:
                            type: string
                            nullable: true
                            example: A short bio.
                          avatar_url:
                            type: string
                            nullable: true
                            example: https://example.com/avatar.png
                          created_at:
                            type: string
                            example: '2026-02-26T19:41:16.797Z'
                          tweet_count:
                            type: integer
                            example: 0
                          followers_count:
                            type: integer
                            example: 0
                          following_count:
                            type: integer
                            example: 0
                          is_following:
                            type: boolean
                            example: false
        '422':
          description: validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Validation failed
                  details:
                    type: array
                    items:
                      type: string
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
        description: New display name
  "/api/v1/users/search":
    get:
      summary: Search users by username or display name
      tags:
      - Users
      security:
      - bearer_auth: []
      parameters:
      - name: q
        in: query
        required: false
        description: Search term (username or display name)
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      responses:
        '200':
          description: empty query returns empty array
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
                          properties:
                            username:
                              type: string
                            display_name:
                              type: string
                              nullable: true
                            bio:
                              type: string
                              nullable: true
                            avatar_url:
                              type: string
                              nullable: true
                            tweet_count:
                              type: integer
                            followers_count:
                              type: integer
                            following_count:
                              type: integer
                            is_following:
                              type: boolean
                    example: []
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 0
                      page:
                        type: integer
                        example: 1
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
servers:
- url: http://localhost:3000
  description: Local development
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
